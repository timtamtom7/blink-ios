name: Blink
options:
  bundleIdPrefix: com.blink
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "7"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"

targets:
  Blink:
    type: application
    platform: iOS
    sources:
      - path: Blink
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Blink/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.blink.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
    info:
      path: Blink/Info.plist
      properties:
        CFBundleDisplayName: Blink
        CFBundleName: Blink
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "7"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Blink needs camera access to record your daily video diary."
        NSMicrophoneUsageDescription: "Blink needs microphone access to record audio with your video diary."
        NSPhotoLibraryAddUsageDescription: "Blink needs permission to save clips to your Camera Roll."
        UIUserInterfaceStyle: Dark
        UISupportsDocumentBrowser: false
        LSSupportsOpeningDocumentsInPlace: false
